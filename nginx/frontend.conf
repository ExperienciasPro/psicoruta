# ====================================
# PsicoRuta — Nginx Config: FRONTEND Server
# ====================================
# Two-Tier Architecture: This server ONLY serves static files.
# NO reverse proxy to Express. The Angular app calls the backend
# server directly via https://api.psicoruta.com
#
# File: /etc/nginx/sites-available/psicoruta.com

server {
    listen 80;
    server_name psicoruta.com www.psicoruta.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name psicoruta.com www.psicoruta.com;

    # ─── SSL (Certbot auto-generates these) ───
    ssl_certificate     /etc/letsencrypt/live/psicoruta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/psicoruta.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Document Root ────────────────────────
    root /var/www/front-psicoruta.com;
    index index.html;

    # ─── SPA Routing ──────────────────────────
    # Angular handles ALL routes (/login, /d/dashboard, /m/today...)
    # If the file doesn't exist on disk, serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Performance: Gzip ────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/javascript
               application/json application/javascript
               application/xml image/svg+xml font/woff2;

    # ─── Cache: Hashed assets (immutable) ─────
    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|webp|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Security Headers ─────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
