# ====================================
# PsicoRuta — Nginx Config: BACKEND Server
# ====================================
# Two-Tier Architecture: This server is a reverse proxy
# to the Express 5 backend running on port 3003 via PM2.
#
# File: /etc/nginx/sites-available/api.psicoruta.com

server {
    listen 80;
    server_name api.psicoruta.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.psicoruta.com;

    # ─── SSL (Certbot auto-generates these) ───
    ssl_certificate     /etc/letsencrypt/live/api.psicoruta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.psicoruta.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Reverse Proxy to Express ─────────────
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large payloads (bulk sync ~50MB)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    # ─── Security Headers ─────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
